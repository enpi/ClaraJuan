<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clara &amp; Juan · 9 de Mayo 2026</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #faf7f2;
      --gold: #b8974a;
      --dark: #3a3028;
      --muted: #7a6e64;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--cream);
      color: var(--dark);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── decorative top border ── */
    .top-border {
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* ── hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 72px 24px 56px;
      gap: 20px;
    }

    .ornament {
      font-size: 2rem;
      color: var(--gold);
      letter-spacing: .3em;
      line-height: 1;
    }

    .names {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 300;
      letter-spacing: .05em;
      line-height: 1.1;
    }

    .names .amp {
      font-style: italic;
      color: var(--gold);
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.35rem);
      color: var(--muted);
      letter-spacing: .08em;
    }

    /* ── divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      width: min(480px, 90%);
      color: var(--gold);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gold);
      opacity: .5;
    }

    .divider-icon {
      font-size: 1.1rem;
    }

    /* ── info cards ── */
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      padding: 48px 24px;
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: #fff;
      border: 1px solid #e8e0d5;
      border-radius: 4px;
      padding: 36px 40px;
      flex: 1 1 220px;
      max-width: 260px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .card-icon {
      font-size: 1.8rem;
      line-height: 1;
      margin-bottom: 4px;
    }

    .card-label {
      font-family: 'Lato', sans-serif;
      font-size: .7rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .card-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--dark);
      line-height: 1.3;
    }

    .card-sub {
      font-size: .85rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── countdown ── */
    .countdown-section {
      padding: 16px 24px 56px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .countdown-label {
      font-family: 'Lato', sans-serif;
      font-size: .7rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .countdown {
      display: flex;
      gap: 24px;
    }

    .count-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .count-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 300;
      color: var(--dark);
      line-height: 1;
      min-width: 2ch;
    }

    .count-name {
      font-size: .65rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .count-sep {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      color: var(--gold);
      opacity: .4;
      align-self: flex-start;
      margin-top: 4px;
      line-height: 1;
    }

    /* ── map link ── */
    .map-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 56px;
      padding: 14px 32px;
      border: 1px solid var(--gold);
      color: var(--gold);
      text-decoration: none;
      font-size: .75rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background .2s, color .2s;
    }

    .map-link:hover {
      background: var(--gold);
      color: #fff;
    }

    /* ── footer ── */
    footer {
      margin-top: auto;
      padding: 24px;
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .1em;
      border-top: 1px solid #e8e0d5;
      width: 100%;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="top-border"></div>

  <section class="hero">
    <div class="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
    <h1 class="names">
      Clara <span class="amp">&amp;</span> Juan
    </h1>
    <p class="tagline">Nos casamos y queremos celebrarlo contigo</p>
  </section>

  <div class="divider"><span class="divider-icon">❧</span></div>

  <div class="cards">
    <div class="card">
      <div class="card-icon">📅</div>
      <div class="card-label">Fecha</div>
      <div class="card-value">9 de Mayo<br>2026</div>
      <div class="card-sub">Sábado</div>
    </div>
    <div class="card">
      <div class="card-icon">🕡</div>
      <div class="card-label">Hora</div>
      <div class="card-value">18:30 h</div>
      <div class="card-sub">Ceremonia</div>
    </div>
    <div class="card">
      <div class="card-icon">📍</div>
      <div class="card-label">Lugar</div>
      <div class="card-value">Chilches</div>
      <div class="card-sub">Calle Jacaranda 24</div>
    </div>
  </div>

  <section class="countdown-section">
    <div class="countdown-label">Faltan</div>
    <div class="countdown">
      <div class="count-unit">
        <span class="count-number" id="cd-days">—</span>
        <span class="count-name">días</span>
      </div>
      <div class="count-sep">·</div>
      <div class="count-unit">
        <span class="count-number" id="cd-hours">—</span>
        <span class="count-name">horas</span>
      </div>
      <div class="count-sep">·</div>
      <div class="count-unit">
        <span class="count-number" id="cd-minutes">—</span>
        <span class="count-name">min</span>
      </div>
      <div class="count-sep">·</div>
      <div class="count-unit">
        <span class="count-number" id="cd-seconds">—</span>
        <span class="count-name">seg</span>
      </div>
    </div>
  </section>

  <a
    class="map-link"
    href="https://maps.google.com/?q=Calle+Jacaranda+24,+Chilches"
    target="_blank"
    rel="noopener"
  >
    🗺 Cómo llegar
  </a>

  <footer>Clara &amp; Juan · 9 · 05 · 2026</footer>

  <script>
    const wedding = new Date('2026-05-09T18:30:00');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function tick() {
      const now  = new Date();
      const diff = wedding - now;

      if (diff <= 0) {
        document.querySelector('.countdown-section').innerHTML =
          '<p style="font-family:\'Cormorant Garamond\',serif;font-size:1.6rem;font-style:italic;color:var(--gold)">¡Hoy es el gran día! 🎉</p>';
        return;
      }

      const days    = Math.floor(diff / 86400000);
      const hours   = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000)  /   60000);
      const seconds = Math.floor((diff %   60000)  /    1000);

      document.getElementById('cd-days').textContent    = days;
      document.getElementById('cd-hours').textContent   = pad(hours);
      document.getElementById('cd-minutes').textContent = pad(minutes);
      document.getElementById('cd-seconds').textContent = pad(seconds);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
